<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Financas da Familia</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
:root{
  --cg:'Century Gothic','Nunito','Trebuchet MS',Arial,sans-serif;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeece8;
  --border:rgba(0,0,0,.10);--text:#1a1a1a;--muted:#6b6b68;--hint:#aaa;
  --lgreen:#1D9E75;--lgreen-l:#E1F5EE;--lgreen-d:#085041;
  --lred:#D85A30;--lred-l:#FAECE7;--lred-d:#4A1B0C;
  --lamber:#BA7517;--lamber-l:#FAEEDA;--lamber-d:#412402;
  --lpurple:#534AB7;--lpurple-l:#EEEDFE;--lpurple-d:#26215C;
  --lblue:#378ADD;--lblue-l:#E6F1FB;--lblue-d:#042C53;
  --lpink:#D4537E;--lpink-l:#FBEAF0;--lpink-d:#4B1528;
  --lorange:#C2570A;--lorange-l:#FDF0E8;--lorange-d:#6B2E05;
  --dk:#0F1117;--dk2:#161B27;--dk3:#1E2535;--dk4:#252D3F;
  --dborder:rgba(255,255,255,.07);
  --dtext:#F0F2FF;--dmuted:#8891AA;--dhint:#4A5270;
  --radius:10px;--radius-lg:14px;--shadow:0 1px 4px rgba(0,0,0,.07);
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--border:rgba(255,255,255,.10);--text:#f0f0f0;--muted:#a0a09d;--hint:#666;--lgreen-l:#0d3326;--lgreen-d:#9FE1CB;--lred-l:#3d1a0d;--lred-d:#F0997B;--lamber-l:#3d2a05;--lamber-d:#FAC775;--lpurple-l:#1e1a4a;--lpurple-d:#AFA9EC;--lblue-l:#0a1f3d;--lblue-d:#85B7EB;--lpink-l:#2d0e1c;--lpink-d:#ED93B1;--lorange-l:#3d1e05;--lorange-d:#FAA06A;}}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--cg);background:var(--bg3);}
.shell{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);color:var(--text);}
.view{display:none;flex-direction:column;min-height:100vh;}
.view.active{display:flex;}

/* ONBOARDING */
.ob-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;gap:1rem;overflow-y:auto;}
.ob-top{display:flex;align-items:center;gap:8px;width:100%;}
.ob-back{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:6px 8px;border-radius:8px;}
.ob-back:hover{background:var(--bg2);}
.ob-card{background:var(--bg);border:.5px solid var(--border);border-radius:16px;padding:1.25rem;width:100%;}
.ob-card-title{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;}
.av-preview{width:60px;height:60px;border-radius:50%;border:3px solid var(--lpurple);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;transition:border-color .2s;}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:10px;}
.av-opt{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .15s;}
.av-opt:hover,.av-opt.sel{border-color:var(--lpurple);border-width:2.5px;}
.av-opt.sel{background:var(--lpurple-l);}
.col-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.col-opt{width:26px;height:26px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s;}
.col-opt:hover{transform:scale(1.1);}
.col-opt.sel{outline:2.5px solid var(--text);outline-offset:2px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--bg2);}
.sdot.active{background:var(--lpurple);}
.sdot.done{background:var(--lgreen);}
.ob-steps{display:flex;gap:5px;}

/* PIN */
.pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2rem 1rem;}
.pin-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;}
.pdots{display:flex;gap:12px;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .2s;}
.pdot.filled{background:var(--lpurple);border-color:var(--lpurple);}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:220px;}
.pbtn{font-family:var(--cg);font-size:18px;font-weight:800;padding:14px;border:none;border-radius:12px;background:var(--bg2);color:var(--text);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.pbtn:active{background:var(--lpurple-l);color:var(--lpurple);}
.pbtn.del{color:var(--lred);}
.pin-err{font-family:var(--cg);font-size:11px;color:var(--lred);min-height:16px;text-align:center;}
.pin-cancel{font-family:var(--cg);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 12px;margin-top:.25rem;}

/* HOME GERAL */
.home-wrap{flex:1;padding:1rem;overflow-y:auto;padding-bottom:2rem;}
.home-greeting{font-family:var(--cg);font-size:20px;font-weight:800;color:var(--text);margin-bottom:2px;}
.home-date{font-family:var(--cg);font-size:11px;color:var(--muted);margin-bottom:1.25rem;}
.home-summary{background:var(--bg);border:.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:1.25rem;box-shadow:var(--shadow);}
.hs-title{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);margin-bottom:10px;}
.hs-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.hs-kpi{border-radius:9px;padding:9px 10px;text-align:center;}
.hs-lbl{font-family:var(--cg);font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;opacity:.75;margin-bottom:2px;}
.hs-val{font-family:var(--cg);font-size:13px;font-weight:800;}
.sec-title{font-family:var(--cg);font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem;}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.app-icon-box{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:27px;transition:transform .12s;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.app-icon:active .app-icon-box{transform:scale(.88);}
.app-icon-lbl{font-family:var(--cg);font-size:9px;font-weight:700;color:var(--text);text-align:center;max-width:62px;line-height:1.2;}
.profiles-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:1.25rem;-webkit-overflow-scrolling:touch;}
.profiles-row::-webkit-scrollbar{display:none;}
.profile-pill{display:flex;align-items:center;gap:7px;padding:8px 13px;background:var(--bg);border:.5px solid var(--border);border-radius:99px;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent;}
.profile-pill:active{transform:scale(.96);}
.ppav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid transparent;}
.ppname{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);}
.pptag{font-family:var(--cg);font-size:9px;color:var(--muted);}
.add-pill{display:flex;align-items:center;gap:5px;padding:8px 13px;background:var(--bg2);border:.5px dashed var(--border);border-radius:99px;cursor:pointer;white-space:nowrap;font-family:var(--cg);font-size:11px;color:var(--muted);flex-shrink:0;-webkit-tap-highlight-color:transparent;}

/* HOME INDIVIDUAL */
.ind-home{flex:1;padding:1rem;overflow-y:auto;padding-bottom:2rem;}
.ind-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
.ind-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:3px solid transparent;flex-shrink:0;}
.ind-name{font-family:var(--cg);font-size:16px;font-weight:800;color:var(--text);}
.ind-sub{font-family:var(--cg);font-size:10px;color:var(--muted);}
.ind-back{margin-left:auto;background:none;border:.5px solid var(--border);cursor:pointer;color:var(--muted);font-size:11px;font-family:var(--cg);font-weight:700;padding:6px 11px;border-radius:8px;}
.ind-kpis{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1rem;}
.ikpi{border-radius:10px;padding:12px 13px;}
.ikpi-lbl{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.8;margin-bottom:3px;}
.ikpi-val{font-family:var(--cg);font-size:18px;font-weight:800;}
.ikpi-sub{font-family:var(--cg);font-size:9px;opacity:.7;margin-top:1px;}
.ind-app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1rem;}

/* SALDO ALERT BANNER */
.saldo-alert{border-radius:12px;padding:11px 14px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:10px;}
.saldo-alert.verde{background:var(--lgreen-l);border-left:3px solid var(--lgreen);}
.saldo-alert.amarelo{background:#FFFBEB;border-left:3px solid #F59E0B;}
.saldo-alert.laranja{background:var(--lorange-l);border-left:3px solid var(--lorange);}
.saldo-alert.vermelho{background:var(--lred-l);border-left:3px solid var(--lred);}
.saldo-alert-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.saldo-alert-title{font-family:var(--cg);font-size:12px;font-weight:800;margin-bottom:2px;}
.saldo-alert-msg{font-family:var(--cg);font-size:10px;line-height:1.4;}
.saldo-alert-bar-bg{height:5px;border-radius:99px;margin-top:6px;overflow:hidden;}
.saldo-alert-bar-fill{height:5px;border-radius:99px;transition:width .4s;}
@media(prefers-color-scheme:dark){.saldo-alert.amarelo{background:#3d2e05;}}

/* PANEL */
.panel-header{background:var(--bg);border-bottom:.5px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:10;}
.ph-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid transparent;flex-shrink:0;}
.ph-name{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--text);flex:1;}
.ph-back{font-family:var(--cg);font-size:10px;font-weight:700;padding:5px 11px;border:.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--muted);cursor:pointer;}
.panel-content{flex:1;overflow-y:auto;padding:12px 12px 90px;}

/* LIGHT COMPONENTS */
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);}
.card-title{font-family:var(--cg);font-size:12px;font-weight:800;color:var(--text);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.stitle{font-family:var(--cg);font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin:11px 0 6px;}
.pbar-bg{background:var(--bg2);border-radius:99px;height:6px;overflow:hidden;}
.pbar-fill{height:6px;border-radius:99px;transition:width .4s;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fgf{grid-column:1/-1;}
.flabel{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.finput{font-family:var(--cg);font-size:13px;padding:9px 10px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;}
.finput:focus{border-color:var(--lpurple);}
.fsel{font-family:var(--cg);font-size:13px;padding:9px 10px;border:.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;width:100%;}
.btn{font-family:var(--cg);font-size:12px;font-weight:800;padding:10px 16px;border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:5px;color:#fff;transition:opacity .15s;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:.8;}
.btn-ghost{font-family:var(--cg);font-size:12px;font-weight:700;padding:10px 16px;border:.5px solid var(--border);border-radius:var(--radius);background:none;color:var(--muted);cursor:pointer;}
.btn-row{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.tx-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius);margin-bottom:5px;box-shadow:var(--shadow);}
.meta-item{background:var(--bg2);border-radius:9px;padding:11px 13px;margin-bottom:7px;}
.meta-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.meta-name{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);}
.meta-pct{font-family:var(--cg);font-size:11px;font-weight:800;}
.meta-vals{display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:3px;}
.meta-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px;}
.cat-mgr-item{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--bg2);border-radius:8px;margin-bottom:5px;}
.cat-mgr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-mgr-lbl{font-family:var(--cg);font-size:11px;font-weight:700;color:var(--text);flex:1;}
.cat-mgr-type{font-family:var(--cg);font-size:9px;color:var(--muted);padding:1px 7px;border-radius:99px;background:var(--bg);}
.limits-item{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--bg2);border-radius:8px;margin-bottom:5px;}
.limits-item span{font-family:var(--cg);font-size:11px;font-weight:700;color:var(--text);flex:1;}
.limits-item em{font-family:var(--cg);font-size:11px;color:var(--muted);font-style:normal;}
.chips{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;align-items:center;}
.chip{font-family:var(--cg);font-size:10px;font-weight:700;padding:4px 11px;border-radius:99px;border:.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;}
.chip.active{background:var(--lpurple);color:#fff;border-color:var(--lpurple);}
.recorrente-badge{font-family:var(--cg);font-size:8px;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--lpurple-l);color:var(--lpurple-d);margin-left:4px;}
.partilhada-badge{font-family:var(--cg);font-size:8px;font-weight:700;padding:1px 6px;border-radius:99px;background:var(--lblue-l);color:var(--lblue-d);margin-left:4px;}

/* DARK BI */
.dash{background:var(--dk);min-height:100%;padding:13px;}
.dash-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.dash-title{font-family:var(--cg);font-size:15px;font-weight:800;color:var(--dtext);}
.dash-sub{font-family:var(--cg);font-size:10px;color:var(--dmuted);margin-top:1px;}
.dash-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.dpill{font-family:var(--cg);font-size:10px;font-weight:800;padding:5px 11px;border-radius:99px;border:.5px solid var(--dborder);background:var(--dk3);color:var(--dmuted);cursor:pointer;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;}
.dpill.dpm.active{background:rgba(55,138,221,.2);color:#7FB3FF;border-color:rgba(55,138,221,.4);}
.dpill.dpf.active{background:rgba(212,83,126,.2);color:#F096B8;border-color:rgba(212,83,126,.4);}
.dpill.dpc.active{background:rgba(83,74,183,.2);color:#AFA9EC;border-color:rgba(83,74,183,.4);}
.d-sels{display:flex;gap:4px;}
.d-sels select{font-family:var(--cg);font-size:10px;padding:4px 7px;border:.5px solid var(--dborder);border-radius:7px;background:var(--dk3);color:var(--dtext);outline:none;}
.dkpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.dkpi{border-radius:12px;padding:12px 13px;}
.dkpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:8px;}
.dkpi-lbl{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.75;margin-bottom:3px;}
.dkpi-val{font-family:var(--cg);font-size:18px;font-weight:800;letter-spacing:-.5px;}
.dkpi-sub{font-family:var(--cg);font-size:9px;opacity:.65;margin-top:1px;}
.dmbar-bg{background:rgba(255,255,255,.07);border-radius:99px;height:5px;overflow:hidden;margin-top:6px;}
.dmbar-fill{height:5px;border-radius:99px;}
.dpanel{background:var(--dk2);border:.5px solid var(--dborder);border-radius:12px;padding:12px 14px;margin-bottom:9px;}
.dpanel-title{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--dtext);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.dpanel-sub{font-size:9px;color:var(--dmuted);font-weight:400;}
.dcomp-row{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;background:var(--dk3);margin-bottom:5px;}
.dcomp-lbl{font-family:var(--cg);font-size:10px;color:var(--dmuted);flex:1;}
.dcomp-val{font-family:var(--cg);font-size:10px;font-weight:700;color:var(--dtext);}
.d-up{background:rgba(231,57,57,.2);color:#F07070;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.d-dn{background:rgba(46,204,138,.15);color:#2ECC8A;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.d-eup{background:rgba(46,204,138,.15);color:#2ECC8A;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.d-edn{background:rgba(231,57,57,.2);color:#F07070;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;}
.dcat-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.dcat-lbl{font-family:var(--cg);font-size:10px;font-weight:700;color:var(--dtext);min-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dcat-bar-bg{flex:1;background:var(--dk4);border-radius:99px;height:5px;overflow:hidden;}
.dcat-bar-fill{height:5px;border-radius:99px;}
.dcat-val{font-family:var(--cg);font-size:9px;color:var(--dmuted);min-width:58px;text-align:right;}
.danual-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px;}
.danual-card{border-radius:9px;padding:11px 13px;}
.danual-lbl{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.danual-val{font-family:var(--cg);font-size:15px;font-weight:700;}
.dduo{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px;padding-top:9px;border-top:.5px solid var(--dborder);}
.dduo-card{border-radius:9px;padding:9px 10px;}
.dduo-name{font-family:var(--cg);font-size:9px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.dduo-kpi{border-radius:5px;padding:5px 7px;margin-bottom:3px;}
.dduo-lbl{font-family:var(--cg);font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;opacity:.7;}
.dduo-val{font-family:var(--cg);font-size:12px;font-weight:800;}
.dalert{border-radius:8px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px;font-family:var(--cg);font-size:10px;font-weight:700;}
.dalert.danger{background:rgba(231,57,57,.12);color:#F07070;border-left:3px solid #E73939;}
.dalert.warn{background:rgba(245,166,35,.12);color:#F5A623;border-left:3px solid #F5A623;}
.dalert.orange{background:rgba(194,87,10,.15);color:#F5A623;border-left:3px solid #C2570A;}
.dalert.ok{background:rgba(46,204,138,.12);color:#2ECC8A;border-left:3px solid #2ECC8A;}
.dalert.info{background:rgba(79,142,247,.12);color:#4F8EF7;border-left:3px solid #4F8EF7;}
.dalert-body{flex:1;}
.dalert-title{font-weight:800;margin-bottom:2px;}
.dalert-bar{height:4px;border-radius:99px;margin-top:6px;overflow:hidden;background:rgba(255,255,255,.1);}
.dalert-bar-fill{height:4px;border-radius:99px;}

/* PATRIMONIO */
.patr-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg2);border-radius:9px;margin-bottom:6px;}
.patr-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.patr-info{flex:1;}
.patr-name{font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text);}
.patr-type{font-family:var(--cg);font-size:9px;color:var(--muted);}
.patr-val{font-family:var(--cg);font-size:12px;font-weight:800;}

/* MERCADO */
.mkt-view{background:var(--dk);min-height:100%;padding:13px;}
.mkt-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.mkt-title{font-family:var(--cg);font-size:15px;font-weight:800;color:var(--dtext);}
.mkt-sub{font-family:var(--cg);font-size:10px;color:var(--dmuted);margin-top:1px;}
.mkt-btns{display:flex;gap:5px;}
.mkt-btn-r{font-family:var(--cg);font-size:10px;font-weight:700;padding:5px 11px;border-radius:8px;background:rgba(79,142,247,.2);color:#4F8EF7;border:none;cursor:pointer;}
.mkt-btn-c{font-family:var(--cg);font-size:10px;font-weight:700;padding:5px 11px;border-radius:8px;background:rgba(255,255,255,.07);color:var(--dmuted);border:none;cursor:pointer;}
.mkt-sdot{width:6px;height:6px;border-radius:50%;background:#2ECC8A;animation:mpulse 2s infinite;}
@keyframes mpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.mkt-stxt{font-family:var(--cg);font-size:10px;color:var(--dmuted);}
.dol-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.dol-card{border-radius:12px;padding:12px 14px;}
.dol-flag{font-size:17px;margin-bottom:4px;}
.dol-tipo{font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;opacity:.75;margin-bottom:2px;}
.dol-val{font-family:var(--cg);font-size:21px;font-weight:800;margin-bottom:2px;}
.dol-delta{font-family:var(--cg);font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;}
.mkt-tabs{display:flex;gap:3px;margin-bottom:10px;background:rgba(255,255,255,.05);border-radius:10px;padding:3px;}
.mkt-tab{font-family:var(--cg);font-size:10px;font-weight:700;padding:6px 10px;border-radius:8px;border:none;background:none;color:var(--dmuted);cursor:pointer;flex:1;transition:all .15s;}
.mkt-tab.active{background:rgba(255,255,255,.07);color:var(--dtext);}
.asset-item{background:rgba(22,27,39,.8);border:.5px solid var(--dborder);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:6px;}
.asset-item.fav-on{border-color:rgba(245,166,35,.3);}
.asset-logo{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.asset-name{font-family:var(--cg);font-size:12px;font-weight:800;color:var(--dtext);}
.asset-desc{font-family:var(--cg);font-size:9px;color:var(--dmuted);margin-top:1px;}
.asset-val{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--dtext);}
.asset-delta{font-family:var(--cg);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;margin-top:2px;}
.a-up{background:rgba(46,204,138,.2);color:#2ECC8A;}
.a-dn{background:rgba(232,93,154,.2);color:#E85D9A;}
.a-neu{background:rgba(136,145,170,.15);color:#8891AA;}
.mfav-btn{font-size:13px;cursor:pointer;opacity:.5;background:none;border:none;padding:2px;}
.mfav-btn.on{opacity:1;}
.mspark{height:30px;width:70px;}
.mkt-chart-panel{background:rgba(22,27,39,.9);border:.5px solid var(--dborder);border-radius:14px;padding:13px;margin-bottom:10px;display:none;}
.mkt-chart-panel.active{display:block;}
.mcp-name{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--dtext);}
.mcp-val{font-family:var(--cg);font-size:21px;font-weight:800;color:var(--dtext);margin-top:2px;}
.mcp-delta{font-family:var(--cg);font-size:11px;font-weight:700;margin-top:1px;}
.mperiod-tabs{display:flex;gap:4px;margin-bottom:9px;}
.mptab{font-family:var(--cg);font-size:10px;font-weight:700;padding:4px 10px;border-radius:7px;background:rgba(255,255,255,.05);color:var(--dmuted);border:none;cursor:pointer;}
.mptab.active{background:rgba(79,142,247,.25);color:#4F8EF7;}
.mkt-cfg-panel{background:rgba(22,27,39,.9);border:.5px solid var(--dborder);border-radius:14px;padding:13px;margin-bottom:10px;display:none;}
.mkt-cfg-panel.active{display:block;}
.mcfg-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;background:rgba(255,255,255,.04);margin-bottom:5px;}
.mcfg-lbl{font-family:var(--cg);font-size:11px;font-weight:700;color:var(--dtext);flex:1;}
.mtoggle{width:34px;height:19px;border-radius:99px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
.mtoggle.on{background:#4F8EF7;}
.mtoggle::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;}
.mtoggle.on::after{left:18px;}
.minsight{background:linear-gradient(135deg,rgba(79,142,247,.12),rgba(139,92,246,.12));border:.5px solid rgba(79,142,247,.25);border-radius:12px;padding:11px 13px;margin-bottom:10px;}
.minsight-title{font-family:var(--cg);font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#4F8EF7;margin-bottom:5px;}
.minsight-txt{font-family:var(--cg);font-size:11px;color:var(--dtext);line-height:1.5;}
.mspin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:#4F8EF7;border-radius:50%;animation:mspin .7s linear infinite;vertical-align:middle;}
@keyframes mspin{to{transform:rotate(360deg);}}
.last-upd{font-family:var(--cg);font-size:9px;color:var(--dhint);margin-top:3px;}

/* MODALS */
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto;}
.modal{background:var(--bg);border-radius:16px;padding:18px;width:100%;max-width:380px;border:.5px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal-title{font-family:var(--cg);font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;}
.modal-btns{display:flex;gap:7px;margin-top:12px;justify-content:flex-end;flex-wrap:wrap;}

/* NOTIFS */
#notif-stack{position:fixed;top:0;left:0;right:0;z-index:9999;pointer-events:none;display:flex;flex-direction:column;align-items:center;padding-top:8px;gap:6px;}
.notif-wrap{pointer-events:all;width:92%;max-width:400px;}
.notif-box{background:#161B27;border:.5px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 13px;display:flex;align-items:flex-start;gap:9px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:nslide .3s ease;}
@keyframes nslide{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
.notif-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.notif-title{font-family:var(--cg);font-size:12px;font-weight:800;color:var(--dtext);margin-bottom:2px;}
.notif-msg{font-family:var(--cg);font-size:10px;color:var(--dmuted);}
.notif-acts{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.notif-btn{font-family:var(--cg);font-size:10px;font-weight:700;padding:4px 10px;border-radius:7px;border:none;cursor:pointer;}
.notif-close{background:rgba(255,255,255,.1);color:var(--dtext);}
.notif-mute{background:rgba(255,255,255,.05);color:var(--dmuted);}

/* BACKUP REMINDER */
#backup-reminder{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:92%;max-width:440px;z-index:9998;padding:0 0 12px;pointer-events:none;}
.bkp-inner{background:#1a1a2e;border:.5px solid rgba(79,142,247,.4);border-radius:16px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.4);pointer-events:all;animation:bkpIn .4s ease;}
@keyframes bkpIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.empty{text-align:center;padding:1.5rem 0;color:var(--hint);font-size:12px;font-family:var(--cg);}
</style>
</head>
<body>
<div class="shell" id="app">
<div id="view-home-geral" class="view active"></div>
<div id="view-onboarding" class="view"></div>

<div id="notif-stack"></div>

<!-- MODAL LANCAR -->
<div class="modal-ov" id="modal-lancar" style="display:none">
  <div class="modal">
    <div class="modal-title" id="lc-title">Novo lancamento</div>
    <div class="form-grid">
      <div class="fg fgf"><label class="flabel">Descricao</label><input class="finput" id="lc-desc" placeholder="Ex: Salario, Mercado..." type="text"></div>
      <div class="fg"><label class="flabel">Valor (R$)</label><input class="finput" id="lc-valor" placeholder="0,00" type="number" min="0" step="0.01" inputmode="decimal"></div>
      <div class="fg"><label class="flabel">Data</label><input class="finput" id="lc-data" type="date"></div>
      <div class="fg"><label class="flabel">Tipo</label><select class="fsel" id="lc-tipo" onchange="lcAtualizaCats()"><option value="receita">Receita</option><option value="despesa">Despesa</option></select></div>
      <div class="fg fgf"><label class="flabel">Categoria</label><select class="fsel" id="lc-cat"></select></div>
      <div class="fg fgf"><label class="flabel">Observacao</label><input class="finput" id="lc-obs" placeholder="Opcional..." type="text"></div>
      <div class="fg fgf" style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border-radius:8px;">
        <input type="checkbox" id="lc-recorrente" style="width:16px;height:16px;cursor:pointer;">
        <label for="lc-recorrente" style="font-family:var(--cg);font-size:11px;font-weight:700;color:var(--text);cursor:pointer;">Lancamento recorrente (repete todo mes)</label>
      </div>
      <div class="fg fgf" id="lc-partilha-wrap" style="display:none;padding:8px 10px;background:var(--bg2);border-radius:8px;">
        <label style="font-family:var(--cg);font-size:11px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:5px;"><input type="checkbox" id="lc-partilhada" style="width:16px;height:16px;"> Despesa compartilhada com o casal</label>
        <div style="font-family:var(--cg);font-size:9px;color:var(--muted)">Divide 50/50 automaticamente</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="fecharMLancar()">Cancelar</button>
      <button class="btn" style="background:var(--lgreen)" onclick="addTxModal('receita')"><i class="ti ti-arrow-up"></i> <span id="lc-lbl-rec">Receita</span></button>
      <button class="btn" style="background:var(--lred)" onclick="addTxModal('despesa')"><i class="ti ti-arrow-down"></i> <span id="lc-lbl-desp">Despesa</span></button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR TX -->
<div class="modal-ov" id="modal-edit-tx" style="display:none">
  <div class="modal">
    <div class="modal-title">Editar lancamento</div>
    <div class="form-grid">
      <div class="fg fgf"><label class="flabel">Descricao</label><input class="finput" id="etx-desc" type="text"></div>
      <div class="fg"><label class="flabel">Valor (R$)</label><input class="finput" id="etx-valor" type="number" min="0" step="0.01" inputmode="decimal"></div>
      <div class="fg"><label class="flabel">Data</label><input class="finput" id="etx-data" type="date"></div>

      <div class="fg fgf"><label class="flabel">Categoria</label><select class="fsel" id="etx-cat"></select></div>
      <div class="fg fgf"><label class="flabel">Observacao</label><input class="finput" id="etx-obs" type="text"></div>

    </div>

</div>

<!-- MODAL META -->
<div class="modal-ov" id="modal-meta" style="display:none">
  <div class="modal">
    <div class="modal-title" id="mt-modal-title">Nova meta de poupanca</div>

      <div class="fg fgf"><label class="flabel">Descricao</label><input class="finput" id="mt-nome" placeholder="Ex: Viagem, Bicicleta..." type="text"></div>
      <div class="fg"><label class="flabel">Valor alvo (R$)</label><input class="finput" id="mt-alvo" placeholder="0,00" type="number" min="0" inputmode="decimal"></div>
      <div class="fg"><label class="flabel">Ja guardado (R$)</label><input class="finput" id="mt-atual" placeholder="0,00" type="number" min="0" inputmode="decimal"></div>
      <div class="fg"><label class="flabel">Prazo (mes/ano)</label><input class="finput" id="mt-prazo" type="month"></div>

<!-- MODAL PATRIMONIO -->

    <div class="modal-btns">
      <button class="btn-ghost" onclick="fecharMPatr()">Cancelar</button>
      <button class="btn" style="background:var(--lpurple)" onclick="salvarPatr()"><i class="ti ti-check"></i> Salvar</button>

  </div>

      <div class="fg"><label class="flabel">Cor</label><input class="finput" id="ec-cor" type="color" style="padding:3px;height:38px;cursor:pointer;"></div>

    <div class="modal-btns">
      <button class="btn-ghost" onclick="fecharMCat()">Cancelar</button>
      <button class="btn" style="background:var(--lpurple)" onclick="salvarCatEdit()"><i class="ti ti-check"></i> Salvar</button>

function fmt(v){return 'R$\u00A0'+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtK(v){return 'R$\u00A0'+Math.round(Number(v)).toLocaleString('pt-BR');}
function fmt2(v){return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function getMesData(txs,mes,ano){
  const fil=txs.filter(t=>{const d=new Date(t.data+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===ano;});
  const rec=fil.filter(t=>t.tipo==='receita').reduce((a,t)=>a+Number(t.valor),0);
  const desp=fil.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+Number(t.valor),0);
  return{rec,desp,saldo:rec-desp,fil};
}

// ═══════════════════════════════════════
// RECORRENTES - aplica automaticamente
// ═══════════════════════════════════════
function aplicarRecorrentes(){
  const mesAtual=NOW.getMonth();const anoAtual=NOW.getFullYear();
  usuarios.forEach(u=>{
    const recs=getRecorrentes(u.id);
    const txs=getTxs(u.id);
    const chaveUlt='fam_rec_ult_'+u.id;
    const ult=LS(chaveUlt,null);
    const mesKey=anoAtual+'-'+mesAtual;
    if(ult===mesKey)return; // ja aplicado este mes
    recs.forEach(r=>{
      // verifica se ja existe este recorrente neste mes
      const jaExiste=txs.some(t=>t.recorrenteId===r.id&&new Date(t.data+'T12:00:00').getMonth()===mesAtual&&new Date(t.data+'T12:00:00').getFullYear()===anoAtual);
      if(!jaExiste){
        txs.unshift({id:Date.now()+'_'+r.id,tipo:r.tipo,descricao:r.descricao+' (recorrente)',valor:r.valor,data:anoAtual+'-'+(String(mesAtual+1).padStart(2,'0'))+'-01',categoria:r.categoria,obs:'Lancado automaticamente',recorrenteId:r.id});
      }
    });
    saveTxs(u.id,txs);
    SS(chaveUlt,mesKey);
  });
}

// ═══════════════════════════════════════
// ALERTA DE SALDO (50/70/90% gastos)
// ═══════════════════════════════════════
function buildSaldoAlert(uid,mes,ano){
  const d=getMesData(getTxs(uid),mes,ano);
  if(d.rec===0)return'';
  const pct=Math.min(100,(d.desp/d.rec)*100);
  const restante=100-pct;
  if(restante>50)return''; // ok, menos de 50% gasto
  let cls,icon,titulo,msg;
  if(restante<=10){cls='vermelho';icon='🔴';titulo='Atencao critica!';msg='Voce ja gastou '+pct.toFixed(0)+'% da sua renda. Restam apenas '+restante.toFixed(0)+'% ('+fmt(d.rec-d.desp)+')';}
  else if(restante<=30){cls='laranja';icon='🟠';titulo='Limite proximo!';msg='Voce ja gastou '+pct.toFixed(0)+'% da renda. Restam '+restante.toFixed(0)+'% ('+fmt(d.rec-d.desp)+').';}
  else{cls='amarelo';icon='🟡';titulo='Aviso de orcamento';msg='Mais da metade da sua renda ja foi comprometida ('+pct.toFixed(0)+'% gasto). Restam '+restante.toFixed(0)+'% ('+fmt(d.rec-d.desp)+').';}
  return`<div class="saldo-alert ${cls}">
    <div class="saldo-alert-icon">${icon}</div>
    <div style="flex:1">
      <div class="saldo-alert-title" style="color:${cls==='vermelho'?'var(--lred-d)':cls==='laranja'?'var(--lorange-d)':'var(--lamber-d)'}">${titulo}</div>
      <div class="saldo-alert-msg" style="color:${cls==='vermelho'?'var(--lred-d)':cls==='laranja'?'var(--lorange-d)':'var(--lamber-d)'}">${msg}</div>
      <div class="saldo-alert-bar-bg" style="background:${cls==='vermelho'?'rgba(216,90,48,.2)':cls==='laranja'?'rgba(194,87,10,.2)':'rgba(186,117,23,.2)'}">
        <div class="saldo-alert-bar-fill" style="width:${pct}%;background:${cls==='vermelho'?'var(--lred)':cls==='laranja'?'var(--lorange)':'#F59E0B'}"></div>
      </div>
    </div>
  </div>`;
}

function renderHomeInd(){

  const tA=metas.reduce((a,m)=>a+m.alvo,0);const tG=metas.reduce((a,m)=>a+m.atual,0);

function openPanel(sec){

  const titles={painel:'Painel BI',extrato:'Extrato',metas:'Metas',familia:'Familia',config:'Config',conquistas:'Conquistas',mercado:'Mercado',patrimonio:'Patrimonio',recorrentes:'Recorrentes'};

function renderPC(sec){
  const pc=document.getElementById('pc');if(!pc)return;
  if(sec==='painel'){renderDash(pc);return;}
  if(sec==='extrato'){renderExtrato(pc);return;}
  if(sec==='metas'){renderMetas(pc);return;}
  if(sec==='familia'){renderFamilia(pc);return;}
  if(sec==='config'){renderConfig(pc);return;}
  if(sec==='conquistas'){renderConquistas(pc);return;}
  if(sec==='mercado'){renderMercadoPanel(pc);return;}
  if(sec==='patrimonio'){renderPatrimonio(pc);return;}
  if(sec==='recorrentes'){renderRecorrentes(pc);return;}
}

function setDashPerfil(id){dashPerfil=id;atualizaDash();}
function atualizaDash(){
  const mSel=document.getElementById('d-mes');const aSel=document.getElementById('d-ano');
  const mes=mSel?parseInt(mSel.value):NOW.getMonth();const ano=aSel?parseInt(aSel.value):NOW.getFullYear();
  if(!dashPerfil)dashPerfil=currentUser.id;
  const isCasal=dashPerfil==='casal';
  const adultos=usuarios.filter(u=>u.tipo==='adulto');
  const perfis=isCasal?adultos.map(u=>u.id):[dashPerfil];
  // update pills
  document.querySelectorAll('.dpill').forEach(b=>{
    const a=b.getAttribute('data-action')||'';
    const isActive=isCasal?a.includes("'casal'"):a.includes("'"+dashPerfil+"'");
    b.classList.toggle('active',isActive);
  });
  const txsAll=perfis.flatMap(uid=>getTxs(uid));
  const dados=perfis.map(uid=>getMesData(getTxs(uid),mes,ano));
  const rec=dados.reduce((a,d)=>a+d.rec,0);
  const desp=dados.reduce((a,d)=>a+d.desp,0);
  const saldo=rec-desp;
  const econ=rec>0?Math.max(0,(saldo/rec)*100):0;
  const filAll=dados.flatMap(d=>d.fil);
  const pctComp=rec>0?Math.min(100,(desp/rec)*100):0;
  let pm=mes-1,pa=ano;if(pm<0){pm=11;pa=ano-1;}
  const prevD=perfis.map(uid=>getMesData(getTxs(uid),pm,pa));
  const pRec=prevD.reduce((a,d)=>a+d.rec,0),pDesp=prevD.reduce((a,d)=>a+d.desp,0),pSaldo=pRec-pDesp;

  // ALERTA SALDO no dashboard
  const dsa=document.getElementById('d-saldo-alert');
  if(dsa&&!isCasal){
    const restante=rec>0?100-Math.min(100,(desp/rec)*100):100;
    if(restante<=90){
      const pctGasto=100-restante;
      let cls,icon,titulo,cor;
      if(restante<=10){cls='danger';icon='🔴';titulo='Critico: '+pctGasto.toFixed(0)+'% gasto!';cor='#F07070';}

      dsa.innerHTML=`<div class="dalert ${cls}" style="margin-bottom:10px;">

    </div>
    <div class="dkpi" style="background:${saldo>=0?'rgba(46,204,138,.1)':'rgba(231,57,57,.1)'};border:.5px solid ${saldo>=0?'rgba(46,204,138,.2)':'rgba(231,57,57,.2)'}">
      <div class="dkpi-icon" style="background:${saldo>=0?'rgba(46,204,138,.2)':'rgba(231,57,57,.2)'};color:${saldo>=0?'#2ECC8A':'#E73939'}"><i class="ti ti-wallet"></i></div>
      <div class="dkpi-lbl" style="color:${saldo>=0?'#2ECC8A':'#E73939'}">Saldo</div>

    const sDesp=MS.map((_,m)=>Math.round(perfis.reduce((a,uid)=>a+getMesData(getTxs(uid),m,ano).desp,0)));
    mkSpark('dsp-rec',sRec,'#4F8EF7');mkSpark('dsp-desp',sDesp,'#E85D9A');
    const bd=MS.map((_,m)=>({rec:Math.round(perfis.reduce((a,uid)=>a+getMesData(getTxs(uid),m,ano).rec,0)),desp:Math.round(perfis.reduce((a,uid)=>a+getMesData(getTxs(uid),m,ano).desp,0))}));
    const legEl=document.getElementById('d-leg-bar');if(legEl)legEl.innerHTML=`<span style="display:flex;align-items:center;gap:4px;font-family:var(--cg);font-size:10px;color:var(--dmuted)"><span style="width:8px;height:8px;border-radius:2px;background:#4F8EF7;display:inline-block"></span>Entradas</span><span style="display:flex;align-items:center;gap:4px;font-family:var(--cg);font-size:10px;color:var(--dmuted)"><span style="width:8px;height:8px;border-radius:2px;background:#E85D9A;display:inline-block"></span>Saidas</span>`;

    let ac=0;if(dashLineChart){dashLineChart.destroy();dashLineChart=null;}
    const lineEl=document.getElementById('d-chart-line');if(lineEl){dashLineChart=new Chart(lineEl,{type:'line',data:{labels:MS,datasets:[{data:bd.map(d=>{ac+=d.rec-d.desp;return Math.round(ac);}),borderColor:'#8B5CF6',backgroundColor:'rgba(139,92,246,.07)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#8B5CF6',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4A5270',font:{family:'Century Gothic',size:8}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#4A5270',font:{family:'Century Gothic',size:8},callback:v=>'R$'+Math.round(v).toLocaleString('pt-BR')},grid:{color:'rgba(255,255,255,.04)'}}}}});}

    const ce=Object.entries(catMap2).sort((a,b)=>b[1]-a[1]).slice(0,7);const ct=ce.reduce((a,c)=>a+c[1],0);

  if(rec===0)alertas.push({t:'info',tx:'Nenhuma entrada lancada neste mes.'});
  const pctG=rec>0?(desp/rec)*100:0;
  if(pctG>=90)alertas.push({t:'danger',ico:'ti-alert-triangle',titulo:'Critico!',tx:pctG.toFixed(0)+'% da renda comprometida. Restam apenas '+fmt(Math.max(0,saldo))+'.'});
  else if(pctG>=70)alertas.push({t:'orange',ico:'ti-alert-triangle',titulo:'Limite proximo',tx:pctG.toFixed(0)+'% comprometida. Restam '+fmt(Math.max(0,saldo))+'.'});
  else if(pctG>=50)alertas.push({t:'warn',ico:'ti-alert-circle',titulo:'Aviso orcamento',tx:pctG.toFixed(0)+'% da renda comprometida. Atenção!'});
  if(saldo<0)alertas.push({t:'danger',ico:'ti-mood-sad',titulo:'Saldo negativo',tx:'Saidas superam entradas em '+fmt(Math.abs(saldo))+'.'});
  if(!isCasal){const lims=getLimits(dashPerfil);Object.entries(lims).forEach(([cat,lim])=>{const g=filAll.filter(t=>t.tipo==='despesa'&&t.categoria===cat).reduce((a,t)=>a+Number(t.valor),0);if(g>lim)alertas.push({t:'danger',ico:'ti-tag',titulo:cat+' ultrapassou!',tx:'Limite '+fmt(lim)+' / Gasto '+fmt(g)});else if(g>lim*.8)alertas.push({t:'warn',ico:'ti-tag',titulo:cat+' em 80%',tx:'Limite '+fmt(lim)+' / Gasto '+fmt(g)});});}
  const da=document.getElementById('d-alertas');if(da)da.innerHTML=alertas.length===0?'<div class="dalert ok"><i class="ti ti-circle-check"></i><div>Orcamento sob controle este mes!</div></div>':alertas.map(a=>`<div class="dalert ${a.t}"><i class="ti ${a.ico||'ti-alert-circle'}"></i><div class="dalert-body"><div class="dalert-title">${a.titulo||''}</div><div>${a.tx}</div></div></div>`).join('');

  // Top cat
  const catMap={};filAll.filter(t=>t.tipo==='despesa').forEach(t=>{catMap[t.categoria]=(catMap[t.categoria]||0)+Number(t.valor);});
  const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);const totCat=sorted.reduce((a,c)=>a+c[1],0);
  const top=sorted[0];const tcw=document.getElementById('d-top-cat');
  if(tcw&&top){const col=isCasal?'#534AB7':catCor(dashPerfil,top[0]);const pct=totCat>0?(top[1]/totCat*100).toFixed(0):0;tcw.innerHTML=`<div class="dpanel"><div class="dpanel-title">Maior gasto do mes</div><div style="display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:9px;background:${col}18;border:.5px solid ${col}40"><div style="width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:${col}25;color:${col};flex-shrink:0"><i class="ti ti-tag"></i></div><div style="flex:1"><div style="font-family:var(--cg);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${col};opacity:.7">maior despesa</div><div style="font-family:var(--cg);font-size:14px;font-weight:700;color:${col}">${top[0]}</div><div style="font-family:var(--cg);font-size:10px;color:${col};opacity:.75">${fmt(top[1])}</div></div><div style="font-family:var(--cg);font-size:18px;font-weight:800;color:${col}">${pct}%</div></div></div>`;}
  else if(tcw)tcw.innerHTML='';

  // Anual totais
  let tD=0,tE=0,mC=0;for(let m=0;m<12;m++){const dm=perfis.reduce((a,uid)=>{const d=getMesData(getTxs(uid),m,ano);return{rec:a.rec+d.rec,desp:a.desp+d.desp};},{rec:0,desp:0});tD+=dm.desp;if(dm.rec-dm.desp>0)tE+=dm.rec-dm.desp;if(dm.rec>0||dm.desp>0)mC++;}
  const dan=document.getElementById('d-anual');if(dan)dan.innerHTML=`
    <div class="danual-card" style="background:rgba(232,93,154,.1)"><div class="danual-lbl" style="color:#E85D9A;opacity:.75">Total gasto ${ano}</div><div class="danual-val" style="color:#FF8CC0">${fmt(tD)}</div><div style="font-family:var(--cg);font-size:9px;color:#E85D9A;margin-top:2px;opacity:.7">Media ${fmt(mC>0?tD/mC:0)}/mes</div></div>
    <div class="danual-card" style="background:rgba(46,204,138,.1)"><div class="danual-lbl" style="color:#2ECC8A;opacity:.75">Total economizado ${ano}</div><div class="danual-val" style="color:#5EEDB0">${fmt(tE)}</div><div style="font-family:var(--cg);font-size:9px;color:#2ECC8A;margin-top:2px;opacity:.7">Media ${fmt(mC>0?tE/mC:0)}/mes</div></div>`;

  // Comparativo
  function delta(c,p,inv=false){if(p===0)return'<span style="font-size:9px;color:#4A5270">-</span>';const d=c-p,pct=Math.abs(d/p*100).toFixed(0),up=d>0;const cl=inv?(up?'d-up':'d-dn'):(up?'d-eup':'d-edn');return`<span class="${cl}">${up?'↑':'↓'} ${pct}%</span>`;}
  const dc=document.getElementById('d-comp');
  if(dc)dc.innerHTML=`<div class="dpanel"><div class="dpanel-title">vs. ${MF[pm]} ${pa}</div>${pRec===0&&pDesp===0?`<div style="font-family:var(--cg);font-size:10px;color:#4A5270">Sem dados para comparar.</div>`:`
    <div class="dcomp-row"><span class="dcomp-lbl">Saidas</span><span class="dcomp-val">${fmt(pDesp)}</span>${delta(desp,pDesp,true)}</div>
    <div class="dcomp-row"><span class="dcomp-lbl">Economia</span><span class="dcomp-val">${fmt(Math.max(0,pSaldo))}</span>${delta(Math.max(0,saldo),Math.max(0,pSaldo),false)}</div>
    <div class="dcomp-row"><span class="dcomp-lbl">Entradas</span><span class="dcomp-val">${fmt(pRec)}</span>${delta(rec,pRec,false)}</div>
    ${isCasal?`<div class="dduo">${adultos.map(a=>{const dd=getMesData(getTxs(a.id),mes,ano);const isM=a.subtipo==='m';const col=isM?'rgba(55,138,221,.15)':'rgba(212,83,126,.15)';const tc=isM?'#7FB3FF':'#F096B8';const bc=isM?'rgba(55,138,221,.2)':'rgba(212,83,126,.2)';return`<div class="dduo-card" style="background:${col}"><div class="dduo-name" style="color:${tc}">${a.avatar} ${a.nome}</div><div class="dduo-kpi" style="background:${bc}"><div class="dduo-lbl" style="color:${tc}">Entradas</div><div class="dduo-val" style="color:${tc}">${fmt(getMesData(getTxs(a.id),mes,ano).rec)}</div></div><div class="dduo-kpi" style="background:${bc}"><div class="dduo-lbl" style="color:${tc}">Saidas</div><div class="dduo-val" style="color:${tc}">${fmt(dd.desp)}</div></div><div class="dduo-kpi" style="background:${bc}"><div class="dduo-lbl" style="color:${tc}">Saldo</div><div class="dduo-val" style="color:${tc}">${fmt(dd.saldo)}</div></div></div>`;}).join('')}</div>`:''}
  `}</div>`;

  // Cats
  const dc2=document.getElementById('d-cats');
  if(dc2){
    if(sorted.length===0){
      dc2.innerHTML='<div style="font-family:var(--cg);font-size:11px;color:#4A5270;text-align:center;padding:1rem 0">Nenhuma despesa neste mes</div>';
    } else {
      dc2.innerHTML=sorted.slice(0,7).map(function(entry){
        var cat=entry[0],val=entry[1];
        var w=totCat>0?((val/totCat)*100).toFixed(0):0;
        var bg=isCasal?'#534AB7':catCor(dashPerfil,cat);
        return '<div class="dcat-row">'
          +'<div class="dcat-lbl">'+cat+'</div>'
          +'<div class="dcat-bar-bg"><div class="dcat-bar-fill" style="width:'+w+'%;background:'+bg+'"></div></div>'
          +'<div class="dcat-val">'+fmt(val)+'</div>'
          +'</div>';
      }).join('');
    }
  }

  // Divisao de despesas partilhadas
  const partilhadas=txsAll.filter(t=>t.tipo==='despesa'&&t.partilhada&&new Date(t.data+'T12:00:00').getMonth()===mes&&new Date(t.data+'T12:00:00').getFullYear()===ano);
  const dd2=document.getElementById('d-divisao');
  if(dd2){
    if(partilhadas.length===0){dd2.innerHTML='<div style="font-family:var(--cg);font-size:10px;color:#4A5270">Nenhuma despesa compartilhada este mes.</div>';}
    else{
      const totalP=partilhadas.reduce((a,t)=>a+Number(t.valor),0);
      const porUid={};
      partilhadas.forEach(t=>{if(!porUid[t._uid])porUid[t._uid]=0;porUid[t._uid]+=Number(t.valor);});
      const metade=totalP/2;
      dd2.innerHTML=`<div style="font-family:var(--cg);font-size:10px;color:#7FB3FF;margin-bottom:7px">Total compartilhado: ${fmt(totalP)} | Cada um deve: ${fmt(metade)}</div>`
        +Object.entries(porUid).map(([uid,v])=>{const ua=adultos.find(u=>u.id===uid);if(!ua)return'';const dif=v-metade;return`<div class="dcomp-row"><span class="dcomp-lbl">${ua.avatar} ${ua.nome}</span><span class="dcomp-val">${fmt(v)}</span><span style="font-size:9px;font-weight:700;color:${dif>0.5?'#F07070':dif<-0.5?'#2ECC8A':'#8891AA'}">${dif>0.5?'Paga '+fmt(dif)+' a mais':dif<-0.5?'Recebe '+fmt(Math.abs(dif)):'Equilibrado'}</span></div>`;}).join('');
    }
  }

  // Ultimos
  const du=document.getElementById('d-ultimos');const recent=[...filAll].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,5);
  if(du)du.innerHTML=recent.length===0?'<div style="font-family:var(--cg);font-size:11px;color:#4A5270;text-align:center;padding:1rem 0">Nenhum lancamento</div>':recent.map(t=>{const isR=t.tipo==='receita';const d=new Date(t.data+'T12:00:00');const dd=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--dk3);border-radius:8px;margin-bottom:5px;"><div style="width:8px;height:8px;border-radius:50%;background:${isR?'#2ECC8A':'#E85D9A'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-family:var(--cg);font-size:11px;font-weight:700;color:var(--dtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.descricao}${t.recorrenteId?'<span style="font-size:8px;background:rgba(83,74,183,.3);color:#AFA9EC;padding:1px 5px;border-radius:99px;margin-left:4px">rec</span>':''}</div><div style="font-family:var(--cg);font-size:9px;color:var(--dmuted)">${dd} · ${t.categoria}</div></div><div style="font-family:var(--cg);font-size:11px;font-weight:800;color:${isR?'#5EEDB0':'#F07070'}">${isR?'+':'-'}${fmt(t.valor)}</div></div>`;}).join('');
}

function renderExtrato(pc){
  pc.innerHTML=`
    <div class="chips">
      <button class="chip${filterTipo==='todos'?' active':''}" onclick="setFT(this,'todos')">Todos</button>
      <button class="chip${filterTipo==='receita'?' active':''}" onclick="setFT(this,'receita')">Entradas</button>
      <button class="chip${filterTipo==='despesa'?' active':''}" onclick="setFT(this,'despesa')">Saidas</button>
    </div>
    <div class="form-grid" style="margin-bottom:9px;">
      <div class="fg"><label class="flabel">Buscar</label><input class="finput" id="ext-search" placeholder="Descricao ou categoria..." type="text" oninput="renderExtList()" style="font-size:11px;padding:7px 9px;"></div>
      <div class="fg"><label class="flabel">Periodo</label>
        <select class="fsel" id="ext-periodo" onchange="renderExtList()" style="font-size:11px;padding:7px 9px;">
          <option value="mes">Este mes</option>
          <option value="3meses">Ultimos 3 meses</option>
          <option value="6meses">Ultimos 6 meses</option>
          <option value="ano">Este ano</option>
          <option value="todos">Todos</option>
        </select>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
      <span style="font-family:var(--cg);font-size:10px;color:var(--muted)" id="ext-count">0 lancamentos</span>
      <span style="font-family:var(--cg);font-size:10px;font-weight:700" id="ext-total"></span>
    </div>
    <div id="ext-list"></div>`;
  renderExtList();
}
function setFT(el,t){filterTipo=t;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderExtList();}
function renderExtList(){
  const list=document.getElementById('ext-list');if(!list)return;
  const search=((document.getElementById('ext-search')||{}).value||'').toLowerCase();
  const periodo=(document.getElementById('ext-periodo')||{}).value||'mes';
  const now=new Date();const mes=now.getMonth(),ano=now.getFullYear();
  let txs=[...getTxs(currentUser.id)].filter(t=>{
    if(filterTipo!=='todos'&&t.tipo!==filterTipo)return false;
    if(search&&!t.descricao.toLowerCase().includes(search)&&!t.categoria.toLowerCase().includes(search))return false;
    const td=new Date(t.data+'T12:00:00');
    if(periodo==='mes')return td.getMonth()===mes&&td.getFullYear()===ano;
    if(periodo==='3meses'){const lim=new Date(ano,mes-2,1);return td>=lim;}
    if(periodo==='6meses'){const lim=new Date(ano,mes-5,1);return td>=lim;}
    if(periodo==='ano')return td.getFullYear()===ano;
    return true;
  }).sort((a,b)=>new Date(b.data)-new Date(a.data));
  const cnt=document.getElementById('ext-count');if(cnt)cnt.textContent=txs.length+' lancamentos';
  const tot=document.getElementById('ext-total');if(tot){const s=txs.filter(t=>t.tipo==='receita').reduce((a,t)=>a+Number(t.valor),0)-txs.filter(t=>t.tipo==='despesa').reduce((a,t)=>a+Number(t.valor),0);tot.textContent='Saldo: '+fmt(s);tot.style.color=s>=0?'var(--lgreen-d)':'var(--lred-d)';}
  list.innerHTML=txs.length===0?'<div class="empty">Nenhum lancamento encontrado</div>':txs.map(t=>txRow(t,true)).join('');
}
function txRow(t,canEdit=false){
  const isR=t.tipo==='receita';const d=new Date(t.data+'T12:00:00');const dd=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'});
  return`<div class="tx-row"><div style="width:8px;height:8px;border-radius:50%;background:${isR?'#1D9E75':'#D85A30'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-family:var(--cg);font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.descricao}${t.recorrenteId?'<span class="recorrente-badge">rec</span>':''}${t.partilhada?'<span class="partilhada-badge">50/50</span>':''}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted)">${dd} · ${t.categoria}${t.obs?' · '+t.obs:''}</div></div><div style="font-family:var(--cg);font-size:12px;font-weight:800;color:${isR?'var(--lgreen-d)':'var(--lred-d)'};flex-shrink:0">${isR?'+':'-'}${fmt(t.valor)}</div>${canEdit?`<button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 3px;" onclick="abrirEditTx('${t.id}')"><i class="ti ti-pencil"></i></button>`:''}<button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 3px;" onclick="delTx('${t.id}')"><i class="ti ti-trash"></i></button></div>`;
}
function delTx(id){if(!confirm('Excluir?'))return;saveTxs(currentUser.id,getTxs(currentUser.id).filter(t=>t.id!==id));if(currentPanel==='extrato')renderExtList();else if(currentPanel==='painel')atualizaDash();}
function abrirEditTx(id){
  const txs=getTxs(currentUser.id);const t=txs.find(t=>t.id===id);if(!t)return;
  editTxId=id;editTxUid=currentUser.id;
  document.getElementById('etx-desc').value=t.descricao;document.getElementById('etx-valor').value=t.valor;document.getElementById('etx-data').value=t.data;document.getElementById('etx-tipo').value=t.tipo;document.getElementById('etx-obs').value=t.obs||'';
  etxAtualizaCats();setTimeout(()=>{const cat=document.getElementById('etx-cat');if(cat)cat.value=t.categoria;},50);
  document.getElementById('modal-edit-tx').style.display='flex';
}
function fecharMEditTx(){document.getElementById('modal-edit-tx').style.display='none';editTxId=null;}
function etxAtualizaCats(){const tipo=(document.getElementById('etx-tipo')||{}).value||'despesa';const sel=document.getElementById('etx-cat');if(!sel)return;const cs=getCats(currentUser.id).filter(c=>c.tipo===tipo||c.tipo==='ambos');sel.innerHTML=cs.map(c=>`<option value="${c.nome}">${c.nome}</option>`).join('');}
function salvarEditTx(){
  if(!editTxId)return;
  const txs=getTxs(editTxUid||currentUser.id);const t=txs.find(t=>t.id===editTxId);if(!t)return;
  t.descricao=(document.getElementById('etx-desc')||{}).value?.trim()||t.descricao;
  t.valor=parseFloat((document.getElementById('etx-valor')||{}).value)||t.valor;
  t.data=(document.getElementById('etx-data')||{}).value||t.data;
  t.tipo=(document.getElementById('etx-tipo')||{}).value||t.tipo;
  t.categoria=(document.getElementById('etx-cat')||{}).value||t.categoria;
  t.obs=(document.getElementById('etx-obs')||{}).value?.trim()||'';
  saveTxs(editTxUid||currentUser.id,txs);fecharMEditTx();
  if(currentPanel==='extrato')renderExtList();else if(currentPanel==='painel')atualizaDash();
}

function renderMetas(pc){
  const u=currentUser;const metas=getMetas(u.id);const mm=getMetaMens(u.id);
  const mes=NOW.getMonth(),ano=NOW.getFullYear();const d=getMesData(getTxs(u.id),mes,ano);
  pc.innerHTML=`<div class="card"><div class="card-title">Meta mensal de economia</div>
    <div class="form-grid"><div class="fg"><label class="flabel">Valor meta (R$)</label><input class="finput" id="mm-v" type="number" placeholder="Ex: 500" value="${mm>0?mm:''}" inputmode="decimal"></div><div class="fg" style="justify-content:flex-end;"><button class="btn" style="background:var(--lpurple);margin-top:17px" onclick="salvarMM()"><i class="ti ti-check"></i> Salvar</button></div></div>
    ${mm>0?`<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-family:var(--cg);font-size:11px;font-weight:800">Progresso este mes</span><span style="font-family:var(--cg);font-size:11px;font-weight:800;color:${d.saldo>=mm?'var(--lgreen-d)':'var(--lamber-d)'}">${Math.min(100,Math.max(0,(d.saldo/mm)*100)).toFixed(0)}%</span></div><div class="pbar-bg"><div class="pbar-fill" style="width:${Math.min(100,Math.max(0,(d.saldo/mm)*100))}%;background:${d.saldo>=mm?'#1D9E75':'#BA7517'}"></div></div><div style="display:flex;justify-content:space-between;font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:2px"><span>${fmt(Math.max(0,d.saldo))}</span><span>${fmt(mm)}</span></div></div>`:''}
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;"><div class="stitle" style="margin:0">Metas de poupanca (${metas.length})</div><button class="btn" style="background:${u.cor};font-size:10px;padding:6px 12px" onclick="abrirMMeta()"><i class="ti ti-plus"></i> Nova</button></div>
  ${metas.length===0?'<div class="empty">Nenhuma meta cadastrada.</div>':metas.map(m=>{
    const mp=m.alvo>0?Math.min(100,(m.atual/m.alvo)*100):0;const mc=mp>=100?'#1D9E75':mp>=50?'#BA7517':'#D85A30';
    const bc=mp>=100?'background:var(--lgreen-l);color:var(--lgreen-d)':mp>=50?'background:var(--lamber-l);color:var(--lamber-d)':'background:var(--lred-l);color:var(--lred-d)';
    let prazoInfo='';
    if(m.prazo){const prazoDate=new Date(m.prazo+'-01');const diffMeses=Math.max(0,(prazoDate.getFullYear()-ano)*12+(prazoDate.getMonth()-mes));const falta=m.alvo-m.atual;const porMes=diffMeses>0?falta/diffMeses:falta;prazoInfo=`<div style="font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:3px;">${m.icon||'🎯'} Prazo: ${m.prazo} · ${diffMeses>0?'Guardar '+fmt(porMes)+'/mes':'Prazo encerrado!'}</div>`;}
    return`<div class="meta-item"><div class="meta-top"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;"><span class="meta-name">${m.icon||'🎯'} ${m.nome}</span><span style="font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700;${bc}">${mp>=100?'Concluida':mp>=50?'Em andamento':'Iniciando'}</span></div><div style="display:flex;align-items:center;gap:5px;"><span class="meta-pct" style="color:${mc}">${mp.toFixed(0)}%</span><button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;" onclick="abrirEditMeta('${m.id}')"><i class="ti ti-pencil"></i></button><button class="meta-del" onclick="delMeta('${m.id}')"><i class="ti ti-x"></i></button></div></div><div class="pbar-bg"><div class="pbar-fill" style="width:${mp}%;background:${mc}"></div></div><div class="meta-vals"><div style="display:flex;align-items:center;gap:5px;"><span>Guardado:</span><input type="number" value="${m.atual}" style="font-family:var(--cg);font-size:10px;width:80px;padding:3px 7px;border:.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;" onchange="updMeta('${m.id}',this.value)"></div><span>Meta: ${fmt(m.alvo)}</span></div>${prazoInfo}</div>`;
  }).join('')}`;
}
function salvarMM(){const v=parseFloat((document.getElementById('mm-v')||{}).value)||0;SS('fam_mm_'+currentUser.id,v);renderPC('metas');}

function renderConquistas(pc){const txs=getTxs(currentUser.id);const metas=getMetas(currentUser.id);const total=txs.length;const totalEco=metas.filter(m=>m.atual>=m.alvo).length;const badges=[{e:'🚀',l:'Primeiro lancamento',ok:total>=1,d:'Faca seu primeiro lancamento'},{e:'💰',l:'Guardou dinheiro',ok:metas.some(m=>m.atual>0),d:'Comece a guardar em uma meta'},{e:'🎯',l:'Meta concluida',ok:totalEco>=1,d:'Conclua sua primeira meta'},{e:'⭐',l:'10 lancamentos',ok:total>=10,d:'Faca 10 movimentacoes'},{e:'🏆',l:'3 metas concluidas',ok:totalEco>=3,d:'Conclua 3 metas'},{e:'💎',l:'Poupador(a)',ok:totalEco>=5,d:'Conclua 5 metas'},{e:'🔄',l:'Recorrentes ativo',ok:getRecorrentes(currentUser.id).length>0,d:'Configure um lancamento recorrente'},{e:'🏛',l:'Patrimonio registrado',ok:getPatrimonio().length>0,d:'Registre um bem ou investimento'}];pc.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">${badges.map(b=>`<div style="background:${b.ok?'var(--lgreen-l)':'var(--bg2)'};border:.5px solid ${b.ok?'#1D9E75':'var(--border)'};border-radius:12px;padding:13px 11px;text-align:center;opacity:${b.ok?1:.45};"><div style="font-size:30px;margin-bottom:6px">${b.e}</div><div style="font-family:var(--cg);font-size:11px;font-weight:800;color:var(--text)">${b.l}</div><div style="font-family:var(--cg);font-size:9px;color:var(--muted);margin-top:3px">${b.ok?'Conquistado!':b.d}</div></div>`).join('')}</div>`;}

function lcAtualizaCats(){const tipo=(document.getElementById('lc-tipo')||{}).value||'despesa';const sel=document.getElementById('lc-cat');if(!sel||!currentUser)return;const cs=getCats(currentUser.id).filter(c=>c.tipo===tipo||c.tipo==='ambos');sel.innerHTML=cs.map(c=>`<option value="${c.nome}">${c.nome}</option>`).join('');const pw=document.getElementById('lc-partilha-wrap');if(pw)pw.style.display=tipo==='despesa'&&currentUser.tipo==='adulto'?'block':'none';}
function abrirMLancar(){
  const u=currentUser;const isFil=u.tipo==='filho';
  document.getElementById('lc-title').textContent=isFil?'Lancamento de '+u.nome:'Novo lancamento';
  document.getElementById('lc-lbl-rec').textContent=isFil?'Recebimento':'Receita';
  document.getElementById('lc-lbl-desp').textContent=isFil?'Gasto':'Despesa';
  document.getElementById('lc-data').value=NOW.toISOString().split('T')[0];
  document.getElementById('lc-desc').value='';document.getElementById('lc-valor').value='';
  if(document.getElementById('lc-obs'))document.getElementById('lc-obs').value='';
  const cb=document.getElementById('lc-recorrente');if(cb)cb.checked=false;
  const cp=document.getElementById('lc-partilhada');if(cp)cp.checked=false;
  document.getElementById('lc-tipo').value='despesa';lcAtualizaCats();
  document.getElementById('modal-lancar').style.display='flex';
}
function fecharMLancar(){document.getElementById('modal-lancar').style.display='none';}
function addTxModal(tipo){
  const desc=(document.getElementById('lc-desc')||{}).value?.trim();
  const valor=parseFloat((document.getElementById('lc-valor')||{}).value);
  const data=(document.getElementById('lc-data')||{}).value;
  const cat=(document.getElementById('lc-cat')||{}).value;
  const obs=(document.getElementById('lc-obs')||{}).value?.trim()||'';
  const isRec=(document.getElementById('lc-recorrente')||{}).checked;
  const isPartilhada=(document.getElementById('lc-partilhada')||{}).checked&&tipo==='despesa';
  if(!desc||!valor||!data){alert('Preencha descricao, valor e data.');return;}
  const tx={id:Date.now()+'',tipo,descricao:desc,valor,data,categoria:cat,obs,partilhada:isPartilhada||false,_uid:currentUser.id};
  if(isRec){tx.recorrenteId=Date.now()+'_rec';const recs=getRecorrentes(currentUser.id);recs.push({id:tx.recorrenteId,tipo,descricao:desc,valor,categoria:cat});saveRecorrentes(currentUser.id,recs);}
  const txs=getTxs(currentUser.id);txs.unshift(tx);saveTxs(currentUser.id,txs);
  fecharMLancar();if(currentPanel==='extrato')renderExtList();else if(currentPanel==='painel')atualizaDash();renderHomeInd();
}
function limparLancamentos(){if(!confirm('Apagar todos os seus lancamentos? Irreversivel!'))return;saveTxs(currentUser.id,[]);renderPC('config');}

async function mFetchDolar(){try{const r=await fetch('https://economia.awesomeapi.com.br/json/last/USD-BRL,USDT-BRL');const d=await r.json();const com=d['USDBRL'];const tur=d['USDTBRL'];mDolar={com:{val:parseFloat(com?.bid||5.18),var:parseFloat(com?.pctChange||-0.32)},tur:{val:parseFloat(tur?.bid||5.41),var:parseFloat(tur?.pctChange||-0.18)}};}catch(e){mDolar={com:{val:5.18,var:-0.32},tur:{val:5.41,var:-0.18}};}
const dc=document.getElementById('m-dol-com');if(dc)dc.textContent='R$ '+fmt2(mDolar.com.val);const dcd=document.getElementById('m-dol-com-d');if(dcd)dcd.innerHTML=`<span class="dol-delta ${deltaClass(mDolar.com.var)}">${deltaIcon(mDolar.com.var)} ${fmtPct(mDolar.com.var)}</span>`;const dt=document.getElementById('m-dol-tur');if(dt)dt.textContent='R$ '+fmt2(mDolar.tur.val);const dtd=document.getElementById('m-dol-tur-d');if(dtd)dtd.innerHTML=`<span class="dol-delta ${deltaClass(mDolar.tur.var)}">${deltaIcon(mDolar.tur.var)} ${fmtPct(mDolar.tur.var)}</span>`;}
async function mFetchCripto(){try{const ids=['bitcoin','ethereum','solana','binancecoin','ripple'];const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+ids.join(',')+'&vs_currencies=brl&include_24hr_change=true');const d=await r.json();const map={BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple'};MATIVOS.filter(a=>a.fonte==='cripto').forEach(a=>{const k=map[a.id];if(d[k]){a.val=d[k].brl;a.var=d[k].brl_24h_change||0;}});}catch(e){MATIVOS.filter(a=>a.fonte==='cripto').forEach(a=>{a.val=MFALLBACK[a.id];a.var=MFALLVAR[a.id];});}}
async function mFetchAcoes(){try{const tickers=MATIVOS.filter(a=>a.fonte==='brapi').map(a=>a.id).join(',');const r=await fetch('https://brapi.dev/api/quote/'+tickers+'?range=1d&interval=1d');const d=await r.json();if(d.results)d.results.forEach(q=>{const a=MATIVOS.find(a=>a.id===q.symbol);if(a){a.val=q.regularMarketPrice;a.var=q.regularMarketChangePercent||0;}});}catch(e){MATIVOS.filter(a=>a.fonte==='brapi').forEach(a=>{a.val=MFALLBACK[a.id];a.var=MFALLVAR[a.id];});}}
function mLoadFixa(){const MFIXA={CDI:{val:10.40,var:0},SELIC:{val:10.50,var:0},LCI:{val:9.20,var:0.05},LCA:{val:9.00,var:0.03},IPCA:{val:6.40,var:0.10}};MATIVOS.filter(a=>a.fonte==='fixa').forEach(a=>{const fd=MFIXA[a.id];if(!fd)return;a.val=fd.val+(Math.random()-.5)*fd.var;a.var=(Math.random()-.5)*0.08;});}
function mCheckNotifs(){const thresh=parseFloat(mCfg.pct||2);MATIVOS.forEach(a=>{if(!a.val||mMuted.includes(a.id))return;const prev=mLastPrices[a.id];if(!prev){mLastPrices[a.id]=a.val;return;}const diff=Math.abs((a.val-prev)/prev*100);if(diff>=thresh){mShowNotif(a,a.val>prev,diff.toFixed(2));mLastPrices[a.id]=a.val;}});MATIVOS.forEach(a=>{if(a.val)mLastPrices[a.id]=a.val;});}
function mShowNotif(ativo,up,pct){const stack=document.getElementById('notif-stack');if(!stack)return;const id='mn-'+Date.now();const wrap=document.createElement('div');wrap.className='notif-wrap';wrap.innerHTML=`<div class="notif-box" id="${id}"><div class="notif-icon" style="background:${up?'rgba(46,204,138,.2)':'rgba(232,93,154,.2)'};color:${up?'#2ECC8A':'#E85D9A'}">${up?'+':'-'}</div><div style="flex:1"><div class="notif-title">${ativo.emoji} ${ativo.nome} ${up?'em alta':'em queda'}!</div><div class="notif-msg">${up?'Subiu':'Caiu'} ${pct}% - ${ativo.isRate?fmt2(ativo.val)+'%':'R$ '+fmt2(ativo.val)}</div><div class="notif-acts"><button class="notif-btn notif-close" onclick="mFecharNotif('${id}')">Fechar</button><button class="notif-btn notif-mute" onclick="mMutarNotif('${ativo.id}','${id}')">Parar alertas</button></div></div></div>`;stack.appendChild(wrap);setTimeout(()=>mFecharNotif(id),12000);}
function mFecharNotif(id){const el=document.getElementById(id);if(el){el.style.opacity='0';el.style.transition='all .3s';setTimeout(()=>el.parentElement?.remove(),300);}}
function mMutarNotif(aid,nid){mMuted=[...new Set([...mMuted,aid])];SS('mkt_muted',mMuted);mFecharNotif(nid);}
function mRenderAtivos(){const list=document.getElementById('m-asset-list');if(!list)return;let items=MATIVOS.filter(a=>!mHidden.includes(a.id)&&a.val);if(mTab==='cripto')items=items.filter(a=>a.cat==='cripto');else if(mTab==='renda-fixa')items=items.filter(a=>a.cat==='renda-fixa');else if(mTab==='acoes')items=items.filter(a=>a.cat==='acoes');else if(mTab==='favoritos')items=items.filter(a=>mFavs.includes(a.id));if(items.length===0){list.innerHTML='<div class="empty" style="color:var(--dhint)">Nenhum ativo</div>';return;}list.innerHTML=items.map(a=>{const isFav=mFavs.includes(a.id);const valStr=a.isRate?fmt2(a.val)+'% a.a.':'R$ '+fmt2(a.val);return`<div class="asset-item${isFav?' fav-on':''}" onclick="mAbrirChart('${a.id}')"><div class="asset-logo" style="background:${a.cor}22;color:${a.cor}">${a.emoji}</div><div style="flex:1;min-width:0"><div class="asset-name">${a.nome}</div><div class="asset-desc">${a.desc}</div></div><div style="display:flex;align-items:center;gap:7px;"><canvas class="mspark" id="msp-${a.id}"></canvas><div style="text-align:right;"><div class="asset-val">${valStr}</div><div><span class="asset-delta ${deltaClass(a.var)}">${deltaIcon(a.var)} ${fmtPct(a.var)}</span></div></div><button class="mfav-btn${isFav?' on':''}" onclick="mToggleFav(event,'${a.id}')">${isFav?'*':'o'}</button></div></div>`;}).join('');Object.values(mSparkCharts).forEach(c=>{try{c.destroy();}catch(e){}});mSparkCharts={};items.forEach(a=>{const el=document.getElementById('msp-'+a.id);if(!el)return;const up=a.var>=0;const n=20;const base=a.val||1;const data=Array.from({length:n},(_,i)=>{const noise=(Math.random()-.48)*base*.02;return Math.max(0,base+(i-n/2)*base*(a.var/100/n)+noise);});data[n-1]=base;const c=new Chart(el,{type:'line',data:{labels:Array(n).fill(''),datasets:[{data,borderColor:up?'#2ECC8A':'#E85D9A',backgroundColor:up?'rgba(46,204,138,.07)':'rgba(232,93,154,.07)',fill:true,tension:0.4,pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});mSparkCharts[a.id]=c;});const top=[...MATIVOS].filter(a=>a.val&&!a.isRate).sort((a,b)=>Math.abs(b.var)-Math.abs(a.var))[0];const ins=document.getElementById('m-insight');const itxt=document.getElementById('m-insight-txt');if(ins&&itxt&&top){ins.style.display='block';const up=top.var>=0;itxt.textContent=`${top.emoji} ${top.nome} e o destaque: ${fmtPct(top.var)} nas ultimas 24h. ${up?'Alta expressiva.':'Queda - avalie com cuidado.'}`;};}
function mAbrirChart(id){const a=MATIVOS.find(a=>a.id===id);if(!a||!a.val)return;mCurrentAsset=a;const p=document.getElementById('m-chart-panel');if(!p)return;p.classList.add('active');const cn=document.getElementById('m-cp-name');if(cn)cn.textContent=a.emoji+' '+a.nome;const cv=document.getElementById('m-cp-val');if(cv)cv.textContent=a.isRate?fmt2(a.val)+'% a.a.':'R$ '+fmt2(a.val);const cd=document.getElementById('m-cp-delta');if(cd){cd.textContent=fmtPct(a.var);cd.style.color=a.var>=0?'#2ECC8A':'#E85D9A';}mDrawChart(a,'1d');p.scrollIntoView({behavior:'smooth',block:'nearest'});}
function mFecharChart(){const p=document.getElementById('m-chart-panel');if(p)p.classList.remove('active');mCurrentAsset=null;}
function mSetPeriod(btn,p){document.querySelectorAll('.mptab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(mCurrentAsset)mDrawChart(mCurrentAsset,p);}
function mDrawChart(a,period){const el=document.getElementById('m-main-chart');if(!el)return;if(mMainChart){mMainChart.destroy();mMainChart=null;}const pts={1:48,7:84,30:120,365:260}[parseInt(period)||1]||48;const base=a.val||1;const drift=a.var/100;const data=Array.from({length:pts},(_,i)=>{const t=i/pts;const trend=base*(1-drift)*Math.pow(1+drift,t);return Math.max(0,trend+(Math.random()-.48)*base*.015);});data[pts-1]=base;const up=data[pts-1]>=data[0];const labels=Array.from({length:pts},(_,i)=>{if(period==='1d'){const h=Math.floor(i*24/pts);const m=Math.floor((i*24/pts-h)*60);return h+':'+(m<10?'0'+m:m);}if(period==='7d')return 'D'+(Math.ceil(i*7/pts));if(period==='30d')return 'D'+(Math.ceil(i*30/pts));return 'M'+(Math.ceil(i*12/pts));});mMainChart=new Chart(el,{type:'line',data:{labels,datasets:[{data,borderColor:up?'#2ECC8A':'#E85D9A',backgroundColor:up?'rgba(46,204,138,.07)':'rgba(232,93,154,.07)',fill:true,tension:0.4,pointRadius:0,borderWidth:2,pointHoverRadius:4,pointHoverBackgroundColor:up?'#2ECC8A':'#E85D9A'}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(22,27,39,.95)',titleColor:'#F0F2FF',bodyColor:'#8891AA',titleFont:{family:'Century Gothic',size:11},bodyFont:{family:'Century Gothic',size:11},callbacks:{label:ctx=>a.isRate?fmt2(ctx.parsed.y)+'%':'R$ '+fmt2(ctx.parsed.y)}}},scales:{x:{ticks:{color:'#4A5270',font:{family:'Century Gothic',size:8},maxTicksLimit:8},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#4A5270',font:{family:'Century Gothic',size:8},callback:v=>a.isRate?fmt2(v)+'%':'R$ '+fmt2(v)},grid:{color:'rgba(255,255,255,.04)'}}}}});}
function mToggleFav(e,id){e.stopPropagation();mFavs=mFavs.includes(id)?mFavs.filter(f=>f!==id):[...new Set([...mFavs,id])];SS('mkt_favs',mFavs);mRenderAtivos();}
function mSetTab(btn,tab){document.querySelectorAll('.mkt-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');mTab=tab;mRenderAtivos();}
function mToggleCfg(){const p=document.getElementById('m-cfg-panel');if(!p)return;p.classList.toggle('active');if(p.classList.contains('active')){const g=document.getElementById('m-cfg-list');if(!g)return;g.innerHTML=MATIVOS.map(a=>`<div class="mcfg-item"><div style="width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;background:${a.cor}22;color:${a.cor}">${a.emoji}</div><div class="mcfg-lbl">${a.nome}</div><button class="mtoggle${mHidden.includes(a.id)?'':' on'}" id="mtog-${a.id}" onclick="mToggleHidden('${a.id}')"></button></div>`).join('');}}
function mToggleHidden(id){mHidden=mHidden.includes(id)?mHidden.filter(h=>h!==id):[...new Set([...mHidden,id])];SS('mkt_hidden',mHidden);const t=document.getElementById('mtog-'+id);if(t)t.classList.toggle('on',!mHidden.includes(id));mRenderAtivos();}
function mSaveCfg(){mCfg.pct=parseFloat((document.getElementById('m-nc-pct')||{}).value||2);mCfg.interval=parseInt((document.getElementById('m-nc-int')||{}).value||5);SS('mkt_cfg',mCfg);mStartTimer();const btn=event?.target;if(btn){btn.textContent='Salvo!';setTimeout(()=>{btn.textContent='Salvar';},1500);}}
async function mRefreshAll(){const icon=document.getElementById('mref-icon');if(icon)icon.innerHTML='<span class="mspin"></span>';const sub=document.getElementById('mkt-sub');if(sub)sub.textContent='Atualizando...';const sd=document.getElementById('mkt-sdot');if(sd)sd.style.background='#F5A623';const st=document.getElementById('mkt-stxt');if(st)st.textContent='Buscando dados...';mLoadFixa();await Promise.all([mFetchDolar(),mFetchCripto(),mFetchAcoes()]);mCheckNotifs();mRenderAtivos();const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});const lu=document.getElementById('m-last-upd');if(lu)lu.textContent='Atualizado as '+now;if(sub)sub.textContent='Mercados ao vivo';if(sd)sd.style.background='#2ECC8A';if(st)st.textContent='Dados atualizados';if(icon)icon.textContent='Atualizar';}
function mStartTimer(){clearInterval(mRefreshTimer);mRefreshTimer=setInterval(()=>{if(document.getElementById('m-asset-list'))mRefreshAll();},(mCfg.interval||5)*60*1000);}
