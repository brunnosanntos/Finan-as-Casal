function exportarDados(){
  const data={versao:6,exportadoEm:new Date().toISOString(),usuarios,txs:{},metas:{},metamens:{},limits:{},cats:{},recorrentes:{},patrimonio:getPatrimonio()};
  usuarios.forEach(u=>{data.txs[u.id]=getTxs(u.id);data.metas[u.id]=getMetas(u.id);data.metamens[u.id]=getMetaMens(u.id);data.limits[u.id]=getLimits(u.id);data.cats[u.id]=getCats(u.id);data.recorrentes[u.id]=getRecorrentes(u.id);});
  SS('bkp_last_date',Date.now());
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='financas-familia-'+NOW.toISOString().split('T')[0]+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importarDados(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.versao){alert('Arquivo invalido.');return;}
      if(!confirm('Substituir todos os dados pelo backup?'))return;
      if(d.usuarios){SS('fam_users',d.usuarios);usuarios=d.usuarios;}
      if(d.txs)Object.entries(d.txs).forEach(([uid,v])=>saveTxs(uid,v));
      if(d.metas)Object.entries(d.metas).forEach(([uid,v])=>saveMetas(uid,v));
      if(d.metamens)Object.entries(d.metamens).forEach(([uid,v])=>SS('fam_mm_'+uid,v));
      if(d.limits)Object.entries(d.limits).forEach(([uid,v])=>saveLimits(uid,v));
      if(d.cats)Object.entries(d.cats).forEach(([uid,v])=>saveCats(uid,v));
      if(d.recorrentes)Object.entries(d.recorrentes).forEach(([uid,v])=>saveRecorrentes(uid,v));
      if(d.patrimonio)savePatrimonio(d.patrimonio);
      const st=document.getElementById('cfg-imp-st');if(st){st.textContent='Importado com sucesso!';setTimeout(()=>{if(st)st.textContent='';},3000);}
      renderHomeGeral();
    }catch(err){alert('Erro ao ler arquivo.');}input.value='';
  };reader.readAsText(file);
}

// ═══════════════════════════════════════
// LEMBRETE BACKUP
// ═══════════════════════════════════════
function checkBackupReminder(){
  const last=LS('bkp_last_date',null);const muted=LS('bkp_muted',false);if(muted)return;
  if(!last||Date.now()-last>30*24*60*60*1000){setTimeout(()=>showBackupBanner(last),2000);}
}
function showBackupBanner(last){
  const el=document.getElementById('backup-reminder');if(el)el.remove();
  const dias=last?Math.floor((Date.now()-last)/(24*60*60*1000)):null;
  const msg=dias?'Seu ultimo backup foi ha '+dias+' dias.':'Voce nunca fez um backup dos seus dados.';
  const div=document.createElement('div');div.id='backup-reminder';
  div.innerHTML=`<div class="bkp-inner"><div style="display:flex;align-items:flex-start;gap:11px;"><div style="width:40px;height:40px;border-radius:11px;background:rgba(79,142,247,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">Back</div><div style="flex:1;"><div style="font-family:var(--cg);font-size:13px;font-weight:800;color:#F0F2FF;margin-bottom:3px;">Hora de fazer backup!</div><div style="font-family:var(--cg);font-size:11px;color:#8891AA;line-height:1.5;">${msg} Exporte para nao perder dados.</div><div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;"><button onclick="bkpAgora()" style="font-family:var(--cg);font-size:11px;font-weight:800;padding:8px 14px;border-radius:9px;border:none;background:#4F8EF7;color:#fff;cursor:pointer;">Fazer backup</button><button onclick="bkpDepois()" style="font-family:var(--cg);font-size:11px;font-weight:700;padding:8px 14px;border-radius:9px;border:.5px solid rgba(255,255,255,.1);background:none;color:#8891AA;cursor:pointer;">Lembrar em 30 dias</button><button onclick="bkpNao()" style="font-family:var(--cg);font-size:11px;font-weight:700;padding:8px 14px;border-radius:9px;border:none;background:none;color:#4A5270;cursor:pointer;">Nao lembrar</button></div></div></div></div>`;
  document.body.appendChild(div);
}
function bkpAgora(){exportarDados();bkpFechar();}
function bkpDepois(){SS('bkp_last_date',Date.now());bkpFechar();}
function bkpNao(){SS('bkp_muted',true);bkpFechar();}
function bkpFechar(){const el=document.getElementById('backup-reminder');if(el){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);}}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
renderHomeGeral();
checkBackupReminder();
</script>
